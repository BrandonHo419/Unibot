[aim]
screen_center_offset = 0
aim_smoothing_factor = 0.5
speed = 1.0
y_speed_multiplier = 1.0
aim_height = 0.5

[communication]
type = rebind
rebind_url = ws://127.0.0.1:19561
rebind_connect_timeout = 5.0
rebind_ping_timeout = 3.0
rebind_reconnect_delay = 1.0


[screen]
group_close_target_blobs_threshold = 3, 3

; HSV color range for target detection
upper_color = 174, 255, 255
lower_color = 126, 55, 143

capture_fov_x = 256
capture_fov_y = 256
aim_fov_x = 100
aim_fov_y = 100
max_loops_per_sec = 200
auto_detect_resolution = true
resolution_x = 1920
resolution_y = 1080

[recoil]
mode = move
recoil_x = 0.0
recoil_y = 0.0
max_offset = 100
recover = 0.0

[trigger]
; Base delay for triggerbot
trigger_delay = 0
; Additional random delay, does nothing if trigger_delay is 0
trigger_randomization = 30
trigger_threshold = 8

[rapid_fire]
; Maximum clicks per second sent by Unibot, used for triggerbot and rapidfire
target_cps = 15

[key_binds]
key_reload_config = 0x70
key_toggle_aim = 0x71
key_toggle_recoil = 0x72
key_exit = 0x73
key_trigger = 0x06
key_rapid_fire = off
aim_keys = 0x05

[debug]
; Show a debug screen
enabled = false
; Refresh debug screen even if cheats are off
always_on = true
; 'game' shows actual screen, 'mask' shows what opencv sees
display_mode = mask
; Capture the entire screen for the debug overlay, or just the FOV region
; Setting to false saves a lot of CPU/GPU when debug is enabled
debug_fullscreen_capture = false
